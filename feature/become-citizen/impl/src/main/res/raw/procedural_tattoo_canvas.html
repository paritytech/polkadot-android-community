<!DOCTYPE html>
<html>
    <head />

    <body>
        <div id="main" style="
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
      ">
            <canvas id="canvas" width="640" height="640"/>
        </div>
        <script type="module">
            const moduleCode = `<MODULE_CODE>`;
            const blob = new Blob([moduleCode], { type: "application/javascript" });
            const moduleUrl = URL.createObjectURL(blob);

            const useModuleScript = document.createElement("script");
            useModuleScript.type = "module";
            useModuleScript.textContent= `
            import { draw } from '${moduleUrl}';

            const canvas = document.getElementById("canvas");
            const width = canvas.width;
            const height = canvas.height;
            const seed = <SEED>;

            const ctx = canvas.getContext("2d");
            ctx.scale(width, height);
            ctx.aspect = width/height;

            draw(ctx, seed);
            ctx.restore();

            window.appInterface.postMessage(canvas.toDataURL('image/png'));
            `;

            document.head.appendChild(useModuleScript);
        </script>
    </body>
</html>
