// DAG-PB (MerkleDAG Protobuf) schema
// From: https://github.com/ipld/ipld/blob/master/specs/codecs/dag-pb/spec.md
syntax = "proto2";

package merkledag;

option java_package = "io.paritytech.polkadotapp.tools_car_parser.proto";
option java_outer_classname = "MerkleDagProto";

message PBLink {
    optional bytes Hash = 1;
    optional string Name = 2;
    optional uint64 Tsize = 3;
}

message PBNode {
    repeated PBLink Links = 2;
    optional bytes Data = 1;
}
