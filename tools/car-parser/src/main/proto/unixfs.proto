// UnixFS protobuf schema
// From: https://github.com/ipfs/specs/blob/main/UNIXFS.md
syntax = "proto2";

package unixfs;

option java_package = "io.paritytech.polkadotapp.tools_car_parser.proto";
option java_outer_classname = "UnixFsProto";

message Data {
    enum DataType {
        Raw = 0;
        Directory = 1;
        File = 2;
        Metadata = 3;
        Symlink = 4;
        HAMTShard = 5;
    }

    required DataType Type = 1;
    optional bytes Data = 2;
    optional uint64 filesize = 3;
    repeated uint64 blocksizes = 4;
    optional uint64 hashType = 5;
    optional uint64 fanout = 6;
}
